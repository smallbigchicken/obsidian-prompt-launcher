<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Obsidian Prompt Launcher</title>
    <style>
      body {
        width: 280px;
        margin: 0;
        padding: 14px;
        background: #fbfbf8;
        color: #171717;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      h1 {
        margin: 0;
        font-size: 16px;
      }

      p {
        margin: 8px 0 0;
        color: #5d5a53;
        font-size: 13px;
        line-height: 1.45;
      }

      .actions {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }

      button {
        width: 100%;
        min-height: 36px;
        border: 0;
        border-radius: 6px;
        background: #336c79;
        color: #fff;
        font: inherit;
        cursor: pointer;
      }

      button.secondary {
        border: 1px solid #dfded8;
        background: #fff;
        color: #171717;
      }

      .status {
        min-height: 18px;
        margin-top: 10px;
        color: #8b3a2b;
        font-size: 12px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <h1>Obsidian Prompt Launcher</h1>
    <p>Use <span id="shortcut-label">Alt+Shift+P</span> on a webpage to search and insert synced prompts.</p>
    <div class="actions">
      <button id="open-palette" type="button">Open Palette</button>
      <button id="open-options" class="secondary" type="button">Open Options</button>
    </div>
    <div id="status" class="status" role="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
