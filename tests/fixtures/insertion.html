<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Insertion Fixture</title>
    <link rel="stylesheet" href="../../src/contentScript.css" />
    <style>
      body {
        margin: 0;
        padding: 32px;
        background: #f4f2ec;
        color: #171717;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(760px, calc(100vw - 64px));
        margin: 0 auto;
      }

      textarea,
      [contenteditable] {
        width: 100%;
        min-height: 160px;
        border: 1px solid #cbc8bf;
        border-radius: 8px;
        padding: 14px;
        background: #fff;
        color: #171717;
        font: inherit;
      }

      [contenteditable] {
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Insertion Fixture</h1>
      <textarea id="plain-target" placeholder="Plain textarea"></textarea>
      <div id="rich-target" role="textbox" contenteditable="true" aria-label="Chat message"></div>
    </main>

    <script>
      window.chrome = {
        runtime: {
          onMessage: {
            addListener() {}
          }
        },
        storage: {
          local: {
            async get() {
              return {
                prompts: [
                  {
                    id: "test-prompt",
                    title: "Fixture Prompt",
                    shortcut: ";fixture",
                    tags: ["test"],
                    path: "fixture.md",
                    content: "Inserted prompt text"
                  }
                ]
              };
            }
          }
        }
      };
    </script>
    <script src="../../src/contentScript.js"></script>
  </body>
</html>
